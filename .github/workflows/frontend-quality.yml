name: Frontend Quality

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-quality.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-quality.yml"
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    env:
      # CI build uses safe placeholders for client Firebase config.
      # Runtime values are injected in deploy environments separately.
      NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyAaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "dummy.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "dummy-project"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "dummy-project.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "1234567890"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:1234567890:web:abcdef123456"
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run production build
        run: npm run build

  e2e-smoke:
    if: github.event_name == 'pull_request'
    needs: test-and-typecheck
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run E2E smoke suite
        run: npx playwright test tests/e2e/access-control-blocked.spec.ts tests/e2e/search-filter-detail.spec.ts tests/e2e/my-properties-regression.spec.ts

  e2e-nightly-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    env:
      NIGHTLY_E2E_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run full E2E suite
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore

      - name: Notify nightly E2E result to Slack
        if: always() && env.NIGHTLY_E2E_WEBHOOK_URL != ''
        shell: pwsh
        run: |
          $status = "${{ job.status }}"
          $icon = if ($status -eq "success") { ":white_check_mark:" } else { ":x:" }
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $payload = @{
            text = "$icon Nightly E2E *$status* for `${{ github.repository }}` on `${{ github.ref_name }}`. Details: $runUrl"
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Method Post -Uri $env:NIGHTLY_E2E_WEBHOOK_URL -ContentType "application/json" -Body $payload
