version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            # 상업 운영 표준: 재현 가능한 설치만 허용 (npm ci 실패 시 즉시 실패)
            - nvm use 20 || nvm install 20
            - |
              if [ -d frontend ] && [ -f frontend/package.json ]; then
                echo "[preBuild] switching to ./frontend from $(pwd)"
                cd frontend
              fi
              echo "[preBuild] install cwd: $(pwd)"
              npm ci --no-audit
        build:
          commands:
            - |
              if [ -d frontend ] && [ -f frontend/package.json ]; then
                echo "[build] switching to ./frontend from $(pwd)"
                cd frontend
              fi
              echo "[build] build cwd: $(pwd)"
              cat > ./.env <<EOF
              DATABASE_URL=$DATABASE_URL
              DIRECT_URL=$DIRECT_URL
              NEXTAUTH_URL=$NEXTAUTH_URL
              NEXTAUTH_SECRET=$NEXTAUTH_SECRET
              ADMIN_SESSION_SECRET=$ADMIN_SESSION_SECRET
              ADMIN_BOOTSTRAP_USERNAME=$ADMIN_BOOTSTRAP_USERNAME
              ADMIN_BOOTSTRAP_PASSWORD=$ADMIN_BOOTSTRAP_PASSWORD
              FACEBOOK_CLIENT_ID=$FACEBOOK_CLIENT_ID
              FACEBOOK_CLIENT_SECRET=$FACEBOOK_CLIENT_SECRET
              GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
              GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
              NEXT_PUBLIC_AWS_REGION=$NEXT_PUBLIC_AWS_REGION
              NEXT_PUBLIC_AWS_API_KEY=$NEXT_PUBLIC_AWS_API_KEY
              NEXT_PUBLIC_AWS_MAP_NAME=$NEXT_PUBLIC_AWS_MAP_NAME
              NEXT_PUBLIC_AWS_PLACE_INDEX_NAME=$NEXT_PUBLIC_AWS_PLACE_INDEX_NAME
              # 서버 전용(Fallback) 변수들을 동일한 값으로 주입
              AWS_REGION=$NEXT_PUBLIC_AWS_REGION
              AWS_API_KEY=$NEXT_PUBLIC_AWS_API_KEY
              AWS_MAP_NAME=$NEXT_PUBLIC_AWS_MAP_NAME
              AWS_PLACE_INDEX_NAME=$NEXT_PUBLIC_AWS_PLACE_INDEX_NAME
              EOF
            # 빌드 중에는 Prisma Client만 생성하고, DB 마이그레이션은 릴리즈 절차에서 별도 실행
            - npx prisma generate --schema=./prisma/schema.prisma
            - npm run build
          env:
            NODE_ENV: production
            NEXTAUTH_URL: $NEXTAUTH_URL
            NEXTAUTH_SECRET: $NEXTAUTH_SECRET
            ADMIN_SESSION_SECRET: $ADMIN_SESSION_SECRET
            ADMIN_BOOTSTRAP_USERNAME: $ADMIN_BOOTSTRAP_USERNAME
            ADMIN_BOOTSTRAP_PASSWORD: $ADMIN_BOOTSTRAP_PASSWORD
            FACEBOOK_CLIENT_ID: $FACEBOOK_CLIENT_ID
            FACEBOOK_CLIENT_SECRET: $FACEBOOK_CLIENT_SECRET
            GOOGLE_CLIENT_ID: $GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET: $GOOGLE_CLIENT_SECRET
            DATABASE_URL: $DATABASE_URL
            DIRECT_URL: $DIRECT_URL
            NEXT_PUBLIC_AWS_REGION: $NEXT_PUBLIC_AWS_REGION
            NEXT_PUBLIC_AWS_API_KEY: $NEXT_PUBLIC_AWS_API_KEY
            NEXT_PUBLIC_AWS_MAP_NAME: $NEXT_PUBLIC_AWS_MAP_NAME
            NEXT_PUBLIC_AWS_PLACE_INDEX_NAME: $NEXT_PUBLIC_AWS_PLACE_INDEX_NAME
            AWS_REGION: $AWS_REGION
            AWS_API_KEY: $AWS_API_KEY
            AWS_MAP_NAME: $AWS_MAP_NAME
            AWS_PLACE_INDEX_NAME: $AWS_PLACE_INDEX_NAME
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*