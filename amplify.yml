version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            # 상업 운영 표준: 재현 가능한 설치만 허용 (npm ci 실패 시 즉시 실패)
            - nvm use 20 || nvm install 20
            - echo "[preBuild] cwd $(pwd)"
            # Amplify 콘솔 등에서 NODE_ENV=production 이 잡혀 있으면 `npm ci` 가 devDependencies 를 생략한다.
            # → vitest·eslint·@next/bundle-analyzer 미설치로 test/lint/build 가 연쇄 실패. 설치 단계만 development 로 고정.
            # Amplify는 NODE_ENV·NPM_CONFIG_PRODUCTION 등으로 devDependencies 생략이 켜질 수 있음.
            # NODE_ENV=development 만으로는 부족할 수 있어 `npm ci --include dev` 로 명시(로컬에서 production+1130패키지 검증).
            - echo "[preBuild] npm ci --include dev"
            # --ignore-scripts 금지: Next.js transitive `sharp` 가 install 스크립트로 Linux용 바이너리를
            # 내려받는다. 무시하면 CodeBuild(Linux)에서 next build 단계가 실패할 수 있음(로컬 Windows와 불일치).
            - |
              npm ci --no-audit --include dev || {
                echo "[preBuild] npm ci failed; dumping npm logs"
                ls -la /root/.npm/_logs || true
                latest_log="$(ls -1t /root/.npm/_logs/*-debug-0.log 2>/dev/null | head -n 1)"
                if [ -n "$latest_log" ]; then
                  echo "[preBuild] latest npm debug log: $latest_log"
                  tail -n 200 "$latest_log" || true
                fi
                exit 1
              }
            - echo "[preBuild] npm ci OK"
        build:
          commands:
            - |
              echo "[build] cwd $(pwd)"
              cat > ./.env <<EOF
              DATABASE_URL=$DATABASE_URL
              DIRECT_URL=$DIRECT_URL
              NEXTAUTH_URL=$NEXTAUTH_URL
              NEXTAUTH_SECRET=$NEXTAUTH_SECRET
              ADMIN_SESSION_SECRET=$ADMIN_SESSION_SECRET
              ADMIN_BOOTSTRAP_USERNAME=$ADMIN_BOOTSTRAP_USERNAME
              ADMIN_BOOTSTRAP_PASSWORD=$ADMIN_BOOTSTRAP_PASSWORD
              FACEBOOK_CLIENT_ID=$FACEBOOK_CLIENT_ID
              FACEBOOK_CLIENT_SECRET=$FACEBOOK_CLIENT_SECRET
              GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
              GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
              NEXT_PUBLIC_AWS_REGION=$NEXT_PUBLIC_AWS_REGION
              NEXT_PUBLIC_AWS_API_KEY=$NEXT_PUBLIC_AWS_API_KEY
              NEXT_PUBLIC_AWS_MAP_NAME=$NEXT_PUBLIC_AWS_MAP_NAME
              NEXT_PUBLIC_AWS_PLACE_INDEX_NAME=$NEXT_PUBLIC_AWS_PLACE_INDEX_NAME
              # 서버 전용(Fallback) 변수들을 동일한 값으로 주입
              AWS_REGION=$NEXT_PUBLIC_AWS_REGION
              AWS_API_KEY=$NEXT_PUBLIC_AWS_API_KEY
              AWS_MAP_NAME=$NEXT_PUBLIC_AWS_MAP_NAME
              AWS_PLACE_INDEX_NAME=$NEXT_PUBLIC_AWS_PLACE_INDEX_NAME
              NEXT_PUBLIC_STAYVIET_PRODUCTION_HOST=$NEXT_PUBLIC_STAYVIET_PRODUCTION_HOST
              EOF
            # Prisma Client (postinstall 이 이미 돌았어도 빌드 단계에서 한 번 더 고정)
            - echo "[build] prisma generate"
            - npx prisma generate --schema=./prisma/schema.prisma
            # GitHub Actions test-and-typecheck 와 동일 품질 게이트 (Lint 0 · 타입 · 단테 후 빌드)
            - echo "[build] npm test"
            - npm test
            - echo "[build] check:banned-terms"
            - npm run check:banned-terms
            - echo "[build] tsc"
            - npx tsc --noEmit
            - echo "[build] lint:p3-tier3"
            - npm run lint:p3-tier3
            - echo "[build] next build"
            - npm run build
            - echo "[build] --- done ---"
          env:
            NODE_ENV: production
            # next build / 클라이언트 번들이 참조하는 공개 Firebase 키 — CI와 동일 플레이스홀더(콘솔에서 덮어쓰기 가능)
            NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyAaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "dummy.firebaseapp.com"
            NEXT_PUBLIC_FIREBASE_PROJECT_ID: "dummy-project"
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "dummy-project.appspot.com"
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "1234567890"
            NEXT_PUBLIC_FIREBASE_APP_ID: "1:1234567890:web:abcdef123456"
            NEXTAUTH_URL: $NEXTAUTH_URL
            NEXTAUTH_SECRET: $NEXTAUTH_SECRET
            ADMIN_SESSION_SECRET: $ADMIN_SESSION_SECRET
            ADMIN_BOOTSTRAP_USERNAME: $ADMIN_BOOTSTRAP_USERNAME
            ADMIN_BOOTSTRAP_PASSWORD: $ADMIN_BOOTSTRAP_PASSWORD
            FACEBOOK_CLIENT_ID: $FACEBOOK_CLIENT_ID
            FACEBOOK_CLIENT_SECRET: $FACEBOOK_CLIENT_SECRET
            GOOGLE_CLIENT_ID: $GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET: $GOOGLE_CLIENT_SECRET
            DATABASE_URL: $DATABASE_URL
            DIRECT_URL: $DIRECT_URL
            NEXT_PUBLIC_AWS_REGION: $NEXT_PUBLIC_AWS_REGION
            NEXT_PUBLIC_AWS_API_KEY: $NEXT_PUBLIC_AWS_API_KEY
            NEXT_PUBLIC_AWS_MAP_NAME: $NEXT_PUBLIC_AWS_MAP_NAME
            NEXT_PUBLIC_AWS_PLACE_INDEX_NAME: $NEXT_PUBLIC_AWS_PLACE_INDEX_NAME
            AWS_REGION: $AWS_REGION
            AWS_API_KEY: $AWS_API_KEY
            AWS_MAP_NAME: $AWS_MAP_NAME
            AWS_PLACE_INDEX_NAME: $AWS_PLACE_INDEX_NAME
            NEXT_PUBLIC_STAYVIET_PRODUCTION_HOST: main.dn98z8m9jfvd5.amplifyapp.com
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*